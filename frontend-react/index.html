<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare - React Single Page App</title>
    <!-- Copy Vanilla CSS directly since they share styling -->
    <link rel="stylesheet" href="../frontend-vanilla/style.css">
    
    <!-- React & ReactDOM (UMD versions) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
