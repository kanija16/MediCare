<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare Project Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin-top: 100px; 
            background-color: #f4f7f6;
            color: #333;
        }
        h1 { color: #2c3e50; }
        p { font-size: 1.2rem; color: #555; margin-bottom: 40px; }
        .links { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            flex-wrap: wrap; 
        }
        a { 
            display: inline-block; 
            padding: 20px 40px; 
            background-color: #3498db; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-size: 1.2rem;
            font-weight: bold; 
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        a:hover { 
            background-color: #2980b9; 
            transform: translateY(-2px);
        }
        .react-btn {
            background-color: #2ecc71;
        }
        .react-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    <h1>Welcome to the MediCare Project</h1>
    <p>Please select which version of the frontend you would like to view:</p>
    
    <div class="links">
        <a href="./frontend-vanilla/index.html">View Vanilla JS Version</a>
        <a href="./frontend-react/index.html" class="react-btn">View React Version</a>
    </div>
</body>
</html>
