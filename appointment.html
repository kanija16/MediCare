<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - MediCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">MediCare</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="doctors.html">Doctors</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="register.html" class="btn-primary">Register</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-wrapper">
        <main class="main-content">
            <section class="page-section">
                <h2 class="section-title">Book an Appointment</h2>
                <div class="form-container">
                    <form id="appointmentForm">
                        <div class="form-group">
                            <label for="patient_name">Your Full Name</label>
                            <input type="text" id="patient_name" required>
                        </div>
                        <div class="form-group">
                            <label for="doctor_id">Select Doctor</label>
                            <select id="doctor_id" required>
                                <option value="">Loading doctors...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="date">Preferred Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label for="time">Preferred Time</label>
                            <input type="time" id="time" required>
                        </div>
                        <div class="form-group">
                            <label for="notes">Additional Notes</label>
                            <textarea id="notes" rows="4" placeholder="Describe your symptoms..."></textarea>
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Confirm Booking</button>
                    </form>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 MediCare Hospital. All Rights Reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
