<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration - MediCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">MediCare</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="doctors.html">Doctors</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="register.html" class="btn-primary">Register</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-wrapper">
        <main class="main-content">
            <section class="page-section">
                <h2 class="section-title">Patient Registration</h2>
                <div class="form-container">
                    <form id="registerForm">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" required>
                        </div>
                        <div class="form-group">
                            <label>Gender:</label>
                            <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                                <label style="font-weight: normal;"><input type="radio" name="gender" value="male" required> Male</label>
                                <label style="font-weight: normal;"><input type="radio" name="gender" value="female"> Female</label>
                                <label style="font-weight: normal;"><input type="radio" name="gender" value="other"> Other</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Existing Conditions (Select any):</label>
                            <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem;">
                                <label style="font-weight: normal;"><input type="checkbox" name="condition" value="diabetes"> Diabetes</label>
                                <label style="font-weight: normal;"><input type="checkbox" name="condition" value="hypertension"> Hypertension</label>
                                <label style="font-weight: normal;"><input type="checkbox" name="condition" value="asthma"> Asthma</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" required>
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
                    </form>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 MediCare Hospital. All Rights Reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
